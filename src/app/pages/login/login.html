<div class="auth-page">
  <div class="auth-box card-dark">
    <div class="auth-logo"><i class="bi bi-hexagon-fill"></i></div>
    <h1>{{ 'login.title' | translate }}</h1>
    <p class="text-muted subtitle">{{ 'login.subtitle' | translate }}</p>

    @if (error()) {
      <div class="alert-danger-soft mb-3">{{ error() | translate }}</div>
    }

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="field">
        <label for="email">{{ 'login.email' | translate }}</label>
        <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">{{ 'login.password' | translate }}</label>
        <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-accent w-100" [disabled]="loading()">
        {{ (loading() ? 'login.loading' : 'login.submit') | translate }}
      </button>
    </form>

    <p class="auth-link">
      {{ 'login.no_account' | translate }}
      <a routerLink="/register">{{ 'login.register_link' | translate }}</a>
    </p>
  </div>
</div>
